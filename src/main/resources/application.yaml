spring:
  application:
    name: worldcupscoreboard

  # Muat .env (format KEY=VALUE) sebagai properties untuk resolve ${...} saat dev.
  # optional: -> tidak error kalau file .env tak ada (mis. di produksi pakai env var asli).
  config:
    import: optional:file:.env[.properties]

  datasource:
    # prepareThreshold=0 wajib untuk Supabase transaction pooler (PgBouncer) di port 6543
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?prepareThreshold=0
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    # PgBouncer transaction pooler tidak dukung session-level advisory lock Flyway
    postgresql:
      transactional-lock: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # Upstash Redis butuh TLS; set REDIS_SSL=false untuk Redis lokal tanpa TLS
      ssl:
        enabled: ${REDIS_SSL:true}

server:
  port: ${SERVER_PORT:8080}

# CORS: hanya izinkan origin frontend (dipisah koma untuk multi-origin)
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  sse:
    # Umur maksimal satu koneksi SSE. nginx proxy_read_timeout HARUS >= nilai ini,
    # kalau tidak nginx yang memutus duluan (defaultnya cuma 60 detik).
    timeout-ms: ${SSE_TIMEOUT_MS:3600000}
    # Interval heartbeat (komentar SSE ':ping'). Harus jauh di bawah idle-timeout
    # perantara terkecil: nginx 60 detik, Cloudflare ~100 detik.
    heartbeat-ms: ${SSE_HEARTBEAT_MS:20000}
  # URL aset eksternal (template, bukan hardcode). {code}=ISO flag, {name}=nama pemain
  assets:
    flag-url-template: ${FLAG_URL_TEMPLATE:https://flagcdn.com/w320/{code}.png}
    # format=png wajib: tanpa itu ui-avatars kadang membalas SVG, dan image optimizer
    # Next menolak SVG dari host eksternal (400) kecuali dangerouslyAllowSVG diaktifkan
    # — yang tidak kita mau, karena SVG remote itu vektor XSS.
    avatar-url-template: ${AVATAR_URL_TEMPLATE:https://ui-avatars.com/api/?name={name}&format=png}
  cache:
    # Prefix semua cache key di Redis supaya tidak tabrakan dengan proyek lain
    # yang berbagi instance Redis yang sama. Key jadi: <prefix><cacheName>::<key>
    # Segmen versi (v1) = namespace format cache; naikkan kalau struktur value berubah.
    key-prefix: ${CACHE_KEY_PREFIX:worldcup:v1:}
    # TTL cache dalam detik — parameterized supaya bisa di-tuning tanpa recompile
    ttl:
      matches-ongoing: ${TTL_MATCHES_ONGOING:5}
      matches-upcoming: ${TTL_MATCHES_UPCOMING:120}
      matches-ended: ${TTL_MATCHES_ENDED:900}
      matches-next: ${TTL_MATCHES_NEXT:5}
      matches-prev: ${TTL_MATCHES_PREV:5}
      matches-detail: ${TTL_MATCHES_DETAIL:30}
      bracket: ${TTL_BRACKET:120}
      teams: ${TTL_TEAMS:1800}
      teams-detail: ${TTL_TEAMS_DETAIL:900}
      team-detail: ${TTL_TEAM_DETAIL:1800}
      player-detail: ${TTL_PLAYER_DETAIL:1800}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true
    db:
      enabled: true

logging:
  level:
    online.puding.worldcupscoreboard: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
