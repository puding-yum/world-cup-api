# nginx untuk world-cup-api di VPS.
#
# Taruh di /etc/nginx/sites-available/worldcup-api, lalu:
#   ln -s /etc/nginx/sites-available/worldcup-api /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Blok SSL diisi otomatis oleh certbot:
#   certbot --nginx -d api.domainmu.com

server {
    listen 80;
    server_name api.domainmu.com;
    # certbot menambahkan redirect ke HTTPS di sini.
    # HTTPS WAJIB: frontend di Vercel disajikan lewat HTTPS, dan browser memblokir
    # fetch/EventSource dari halaman HTTPS ke backend HTTP (mixed content).
}

server {
    listen 443 ssl http2;
    server_name api.domainmu.com;

    # ssl_certificate / ssl_certificate_key diisi certbot.

    # ---------------------------------------------------------------------
    # SSE — endpoint ini TIDAK boleh diperlakukan seperti request biasa.
    #
    # Tanpa blok ini, live score diam saja TANPA error apa pun:
    #  - proxy_buffering default ON: nginx menahan output sampai buffer penuh.
    #    SSE menetes sedikit-sedikit dan tidak pernah "penuh", jadi event
    #    nyangkut di nginx dan tidak pernah sampai ke browser.
    #  - proxy_read_timeout default 60 detik: koneksi SSE sengaja menganggur
    #    menunggu gol, jadi nginx menganggapnya macet lalu memutus tiap 60 detik.
    #  - gzip juga menahan data per-buffer, efeknya sama seperti buffering.
    # ---------------------------------------------------------------------
    location /stream {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Connection "";      # jangan kirim "Connection: close"

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        # Harus >= app.sse.timeout-ms (default 3600000 ms = 1 jam), kalau tidak
        # nginx yang memutus duluan.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Endpoint REST biasa — buffering di sini justru bagus.
    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # Actuator jangan dibuka ke publik.
    location /actuator {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8080;
    }
}
