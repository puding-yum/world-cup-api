# nginx untuk world-cup-api di VPS.
#
# Config ini HANYA blok port 80. Setelah dipasang, jalankan:
#   sudo certbot --nginx -d api.worldcup.puding.online
# Certbot otomatis: menambah blok 443 (SSL), menambah redirect 80->443, dan
# MENYALIN semua `location` di bawah ke blok 443 — termasuk pengaturan SSE.
#
# Pasang:
#   sudo ln -s /etc/nginx/sites-available/worldcup-api /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.worldcup.puding.online;

    # ---------------------------------------------------------------------
    # SSE — endpoint ini TIDAK boleh diperlakukan seperti request biasa.
    #
    # Tanpa blok ini, live score diam saja TANPA error apa pun:
    #  - proxy_buffering default ON: nginx menahan output sampai buffer penuh.
    #    SSE menetes sedikit-sedikit dan tidak pernah "penuh", jadi event
    #    nyangkut di nginx dan tidak pernah sampai ke browser.
    #  - proxy_read_timeout default 60 detik: koneksi SSE sengaja menganggur
    #    menunggu gol, jadi nginx menganggapnya macet lalu memutus tiap 60 detik.
    #  - gzip juga menahan data per-buffer, efeknya sama seperti buffering.
    # ---------------------------------------------------------------------
    location /stream {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Connection "";      # jangan kirim "Connection: close"

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        # Harus >= app.sse.timeout-ms (default 3600000 ms = 1 jam), kalau tidak
        # nginx yang memutus duluan.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Endpoint REST biasa — buffering di sini justru bagus.
    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # Actuator jangan dibuka ke publik.
    location /actuator {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8080;
    }
}
